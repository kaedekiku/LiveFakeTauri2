<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiveFake - 字幕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: "MS UI Gothic", "Meiryo", "Segoe UI Emoji", "Apple Color Emoji", sans-serif;
    user-select: none;
  }
  #subtitleRoot {
    position: relative;
    width: 100%;
    height: 100%;
    background: rgba(26, 26, 46, 1.0);
    color: #ffffff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #subtitleContent {
    position: relative;
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    overflow: hidden;
    padding: 6px 10px;
    pointer-events: none;
  }
  #subtitleMeta {
    font-size: 12px;
    line-height: 1.4;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
    flex-shrink: 0;
    text-shadow: 0 0 2px rgba(0,0,0,0.9), 1px 1px 2px rgba(0,0,0,0.9);
  }
  #subtitleBody {
    font-size: 28px;
    line-height: 1.4;
    color: #ffffff;
    word-break: break-word;
    overflow-y: auto;
    flex: 1;
    white-space: pre-wrap;
    text-shadow: 0 0 2px rgba(0,0,0,0.9), 0 0 4px rgba(0,0,0,0.9), 1px 1px 2px rgba(0,0,0,0.9);
  }
  .hl-text { border-radius: 2px; padding: 0 1px; }
  .hl-id { font-weight: bold; }
</style>
</head>
<body>
<div id="subtitleRoot">
  <div id="subtitleContent">
    <div id="subtitleMeta"></div>
    <div id="subtitleBody">字幕待機中</div>
  </div>
</div>
<script>
  var rootEl = document.getElementById("subtitleRoot");
  var metaEl = document.getElementById("subtitleMeta");
  var bodyEl = document.getElementById("subtitleBody");

  function escapeHtml(s) {
    var d = document.createElement("div");
    d.textContent = String(s);
    return d.innerHTML;
  }

  window.__subtitleEntry = function(entry) {
    var e = entry || {};
    var parts = [];
    if (e.threadTitle) parts.push('<span style="color:#88aaff">' + escapeHtml(e.threadTitle) + '</span>');
    if (e.responseNo != null) parts.push('<span style="color:#aaaaaa">' + escapeHtml(e.responseNo) + '番</span>');
    if (e.name)        parts.push('<span style="color:#88ff88">' + escapeHtml(e.name) + '</span>');
    if (e.id) {
      var idColor = (e.idColor || "#cc8800").replace(/[^#a-zA-Z0-9]/g, "");
      parts.push('<span class="hl-id" style="color:' + idColor + '">ID:' + escapeHtml(e.id) + '</span>');
    }
    if (e.date) parts.push('<span style="color:#999999">' + escapeHtml(e.date) + '</span>');
    metaEl.innerHTML = parts.join("&nbsp;&nbsp;");

    if (e.bodyHtml) {
      bodyEl.innerHTML = e.bodyHtml;
    } else {
      bodyEl.textContent = e.body || "";
    }
  };

  window.__setOpacity = function(value) {
    var a = Math.max(0.1, Math.min(1.0, Number(value) || 1.0));
    rootEl.style.background = "rgba(26, 26, 46, " + a + ")";
  };

  window.__setFontSize = function(size) {
    var s = Math.max(10, Math.min(96, Number(size) || 28));
    bodyEl.style.fontSize = s + "px";
  };

  window.__setMetaFontSize = function(size) {
    var s = Math.max(8, Math.min(48, Number(size) || 12));
    metaEl.style.fontSize = s + "px";
  };

  rootEl.addEventListener("mousedown", function(e) {
    if (e.button === 0 && window.__TAURI_INTERNALS__) {
      window.__TAURI_INTERNALS__.invoke("plugin:window|start_dragging").catch(function(){});
    }
  });
</script>
</body>
</html>
