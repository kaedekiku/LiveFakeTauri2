<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiveFake - 字幕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    font-family: "MS UI Gothic", "Meiryo", "Segoe UI Emoji", "Apple Color Emoji", sans-serif;
    color: #ffffff;
    user-select: none;
  }
  #dragRegion {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 8px 12px;
    overflow: hidden;
    cursor: move;
  }
  #subtitleMeta {
    font-size: 12px;
    line-height: 1.4;
    color: #cccccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
    flex-shrink: 0;
  }
  #subtitleBody {
    font-size: 28px;
    line-height: 1.4;
    color: #ffffff;
    word-wrap: break-word;
    overflow-wrap: break-word;
    overflow-y: auto;
    flex: 1;
  }
  .hl-text { border-radius: 2px; padding: 0 1px; }
  .hl-id { font-weight: bold; }
  #subtitleMeta .meta-thread-title { color: #88aaff; }
  #subtitleMeta .meta-name { color: #88ff88; }
  #subtitleMeta .meta-id { font-weight: bold; }
  #subtitleMeta .meta-date { color: #999999; }
</style>
</head>
<body>
<div id="dragRegion" data-tauri-drag-region>
  <div id="subtitleMeta"></div>
  <div id="subtitleBody">字幕ウィンドウ</div>
</div>
<script>
  var _setupDone = false;

  function tauriInvoke(cmd, args) {
    var ti = window.__TAURI_INTERNALS__;
    if (!ti) return Promise.reject("no tauri");
    return ti.invoke(cmd, args || {});
  }

  function tauriListen(eventName, callback) {
    var ti = window.__TAURI_INTERNALS__;
    if (!ti) return;
    var cbId = ti.transformCallback(function(ev) { callback(ev.payload); });
    tauriInvoke("plugin:event|listen", {
      event: eventName,
      target: { kind: "Any" },
      handler: cbId,
    });
  }

  function setup() {
    if (_setupDone) return;
    _setupDone = true;

    tauriListen("subtitle-update", function(p) { if (p) updateContent(p); });
    tauriListen("subtitle-opacity", function(p) {
      if (p && p.opacity != null) {
        var o = p.opacity;
        var r = Math.round(26 + (255 - 26) * (1 - o));
        var g = Math.round(26 + (255 - 26) * (1 - o));
        var b = Math.round(46 + (255 - 46) * (1 - o));
        document.body.style.background = "rgb(" + r + "," + g + "," + b + ")";
      }
    });
    tauriListen("subtitle-font-size", function(p) {
      if (p && p.size) document.getElementById("subtitleBody").style.fontSize = p.size + "px";
    });
    tauriListen("subtitle-meta-font-size", function(p) {
      if (p && p.size) document.getElementById("subtitleMeta").style.fontSize = p.size + "px";
    });
  }

  // Poll for Tauri internals — retry up to 5 seconds
  var _retries = 0;
  function waitForTauri() {
    if (window.__TAURI_INTERNALS__) {
      setup();
      return;
    }
    if (_retries < 100) {
      _retries++;
      setTimeout(waitForTauri, 50);
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    waitForTauri();
  });

  function escapeHtml(str) {
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function updateContent(data) {
    var meta = document.getElementById("subtitleMeta");
    var body = document.getElementById("subtitleBody");
    if (!data) return;

    var parts = [];
    if (data.threadTitle) parts.push('<span class="meta-thread-title">' + escapeHtml(data.threadTitle) + '</span>');
    if (data.name) parts.push('<span class="meta-name">' + escapeHtml(data.name) + '</span>');
    if (data.id) {
      var color = data.idColor || "#cc8800";
      parts.push('<span class="meta-id hl-id" style="color:' + color + '">' + escapeHtml("ID:" + data.id) + '</span>');
    }
    if (data.date) parts.push('<span class="meta-date">' + escapeHtml(data.date) + '</span>');
    meta.innerHTML = parts.join(" ");

    if (data.bodyHtml) {
      body.innerHTML = data.bodyHtml;
    } else {
      body.textContent = data.body || "";
    }
  }
</script>
</body>
</html>
