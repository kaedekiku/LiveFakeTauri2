[licenses]
# Allow common permissive licenses.
# Anything NOT listed here is automatically denied — including GPL-2.0/3.0, AGPL-3.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "LGPL-2.1-or-later",        # NOT GPL; weak copyleft, library-safe
    "CDLA-Permissive-2.0",      # Community Data License Agreement — permissive (webpki-roots)
]

[bans]
multiple-versions = "warn"
