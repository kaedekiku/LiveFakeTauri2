name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Build Windows exe
        working-directory: apps/desktop
        run: npx tauri build --config '{"bundle":{"active":false}}'

      - name: Package as ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out
          Compress-Archive -Path target/release/livefake.exe -DestinationPath out/livefake-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: out/livefake-win-x64.zip

  attach-to-release:
    needs: [build-windows-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-x64/*
